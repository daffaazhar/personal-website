services:
  web:
    container_name: personal-website

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped
    init: true

    ports:
      - '127.0.0.1:3000:3000'

    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0

    env_file:
      - .env.production

    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3000/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    stop_grace_period: 30s
